<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plane Game</title>
    <style>
        @font-face {
            font-family: 'PixelFont';
            src: url('https://yourfonturl.com/pixelfont.ttf'); /* url font */
        }

        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: black;
            background-image: url('https://raw.githubusercontent.com/wueme-byte/cosmos_2D_game/main/images/cosmossky.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            color: white;
            font-family: Arial, sans-serif;
            width: 100%;
            height: 100%;
        }

        .background-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

.background-earth {
            position: absolute;
            bottom: -10%;
            left: 0;
            width: 100%;
            height: 70%;
            background-image: url('https://raw.githubusercontent.com/wueme-byte/cosmos_2D_game/main/images/earth.png');
            background-size: cover;
            background-position: bottom center;
            background-repeat: no-repeat;
            animation: earthPulse 4s ease-in-out infinite alternate;
        }

        @keyframes earthPulse {
            0% { opacity: 0.75; }
            100% { opacity: 1; }
        }

        .game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            display: none; /* Hide until the game starts */
        }

        .loading-screen, .end-screen, .congrats-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            z-index: 10;
            display: none;
        }

        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://raw.githubusercontent.com/wueme-byte/cosmos_2D_game/main/images/faceofgame.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            z-index: 10;
        }

        .start-button {
            padding: 10px 20px;
            background-color: grey;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 24px;
        }

        .start-button:hover {
            background-color: darkgrey;
        }

        .plane {
            position: absolute;
            width: 70px; 
            height: 70px; 
            background-image: url('https://raw.githubusercontent.com/wueme-byte/cosmos_2D_game/main/images/image-removebg-preview.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            left: 50%;
            transform: translateX(-50%);
            bottom: 25vh;
            z-index: 2; /* Ensure that the aircraft is above the background */
            display: none; /* Hide until the game starts */
        }

        .plane-start {
            animation: planeStart 5s forwards;
        }

        @keyframes planeStart {
            0% {
                top: -100px;
                transform: translateX(-50%) scale(5);
            }
            100% {
                top: calc(100vh - 45vh); 
                transform: translateX(-50%) scale(1);
            }
        }

        .plane-end {
            animation: planeEnd 3s forwards;
        }

        @keyframes planeEnd {
            0% {
                bottom: 25vh;
                transform: translateX(-50%) scale(1);
            }
            100% {
                bottom: 110%;
                transform: translateX(-50%) scale(0.5);
            }
        }

        .star {
            position: absolute;
            width: 30px;
            height: 30px;
            top: 0;
            background-image: url('https://raw.githubusercontent.com/wueme-byte/cosmos_2D_game/main/images/newstar.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 2;
            will-change: transform;
        }

        .meteor {
            position: absolute;
            top: 0;
            background-size: cover;
            z-index: 2; /* upper then background */
            will-change: transform;
        }

        .explosion {
            position: absolute;
            width: 200px; 
            height: 200px; 
            background-image: url('https://raw.githubusercontent.com/wueme-byte/cosmos_2D_game/main/images/blow.png');
            background-size: cover;
            display: none;
            z-index: 5; /* upper then all elements */
        }

        .score {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 20px;
            z-index: 2; 
            display: none; /* hide untill start */
        }

        .timer {
            position: absolute;
            top: 20%; 
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-family: 'PixelFont', Arial, sans-serif;
            z-index: 2;
            display: none; 
        }

        .end-screen {
            display: none; /* hide till the end */
        }

        .button-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            position: absolute;
            bottom: 20px; 
            width: 100%;
        }

        .button {
            margin-top: 20px; 
            padding: 10px 20px;
            background-color: grey;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 18px;
        }

        .button:hover {
            background-color: darkgrey;
        }

        .message {
            margin-bottom: 20px; 
        }

        @keyframes blink {
            0%, 50%, 100% {
                opacity: 1;
            }
            25%, 75% {
                opacity: 0;
            }
        }

        .fade {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(to bottom, black, transparent);
            z-index: 1;
        }

        .congrats-screen {
            display: none;
            flex-direction: column;
        }

        .desktop-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            color: white;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
            font-size: 28px;
            text-align: center;
            gap: 16px;
        }

        .desktop-warning span {
            font-size: 64px;
        }
    </style>
</head>
<body>
    <div class="desktop-warning" id="desktop-warning">
        <span>📱</span>
        <div>Oops, please switch to a mobile device to join.</div>
    </div>

    <div class="loading-screen" id="loading-screen">Loading...</div>
    <div class="start-screen" id="start-screen">
        <button class="start-button" onclick="startGame()">START</button>
    </div>
    <div class="background-container">
        <div class="background-earth"></div>
    </div>
    <div class="game-container" id="game-container">
        <div class="plane" id="plane"></div>
        <div class="score" id="score">Score: 0</div>
        <div class="timer" id="timer">20</div>
    </div>
    <div class="explosion" id="explosion"></div>
    <div class="end-screen" id="end-screen">
        <div class="message">PLANE IS CRASHED</div>
        <div class="button-container">
            <button class="button" onclick="retryGame()">RETRY</button>
            <button class="button" onclick="quitGame()">QUIT</button>
        </div>
    </div>
    <div class="congrats-screen" id="congrats-screen">
        <div class="message">CONGRATULATIONS!</div>
        <div id="earned-score">YOU EARNED: 0</div>
    </div>

    <script>
        const plane = document.getElementById('plane');
        const gameContainer = document.getElementById('game-container');
        const scoreElement = document.getElementById('score');
        const timerElement = document.getElementById('timer');
        const loadingScreen = document.getElementById('loading-screen');
        const startScreen = document.getElementById('start-screen');
        const endScreen = document.getElementById('end-screen');
        const congratsScreen = document.getElementById('congrats-screen');
        const earnedScore = document.getElementById('earned-score');
        const explosion = document.getElementById('explosion');
        let score = 0;
        let isDragging = false;
        let gameOver = false;
        let gameIntervals = [];
        let activeRafs = new Set();

        const PLANE_W = 70;
        const PLANE_H = 70;
        let planeLeft = window.innerWidth / 2 - PLANE_W / 2;

        function getPlaneBox() {
            const bottom = window.innerHeight * 0.75;
            return { left: planeLeft, right: planeLeft + PLANE_W, top: bottom - PLANE_H, bottom };
        }

        window.addEventListener('load', () => {
            loadingScreen.style.display = 'none';

            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
                || (navigator.maxTouchPoints > 0 && window.innerWidth <= 1024);

            if (!isMobile) {
                document.getElementById('desktop-warning').style.display = 'flex';
            }
        });

        plane.addEventListener('touchstart', (event) => {
            if (!gameOver) {
                isDragging = true;
            }
        });

        plane.addEventListener('touchend', (event) => {
            if (!gameOver) {
                isDragging = false;
            }
        });

        gameContainer.addEventListener('touchmove', (event) => {
            event.preventDefault();
            if (isDragging && !gameOver) {
                const touch = event.touches[0];
                let newLeft = touch.clientX - PLANE_W / 2;
                newLeft = Math.max(0, newLeft);
                newLeft = Math.min(window.innerWidth - PLANE_W, newLeft);
                planeLeft = newLeft;
                plane.style.left = `${newLeft}px`;
            }
        }, { passive: false });

        function createStar() {
            const star = document.createElement('div');
            star.classList.add('star');
            const starLeft = Math.random() * window.innerWidth;
            star.style.left = `${starLeft}px`;
            gameContainer.appendChild(star);

            let starY = 0;
            let lastTime = null;
            let rafId;
            let cancelled = false;

            function fall(timestamp) {
                if (cancelled) return;
                if (!lastTime) lastTime = timestamp;
                const delta = Math.min(timestamp - lastTime, 50);
                lastTime = timestamp;

                starY += 5 * (delta / 30);
                star.style.transform = `translateY(${starY}px)`;

                if (starY > window.innerHeight) {
                    star.remove();
                    activeRafs.delete(cancel);
                    return;
                }

                if (!gameOver) {
                    const p = getPlaneBox();
                    if (starY < p.bottom &&
                        starY + 30 > p.top &&
                        starLeft < p.right &&
                        starLeft + 30 > p.left) {
                        star.remove();
                        score++;
                        scoreElement.textContent = `Score: ${score}`;
                        activeRafs.delete(cancel);
                        return;
                    }
                }

                rafId = requestAnimationFrame(fall);
            }

            rafId = requestAnimationFrame(fall);
            const cancel = () => { cancelled = true; cancelAnimationFrame(rafId); star.remove(); };
            activeRafs.add(cancel);
        }

        function createMeteor() {
            const meteorTypes = [
                'https://raw.githubusercontent.com/wueme-byte/cosmos_2D_game/main/images/meteor.png',
                'https://raw.githubusercontent.com/wueme-byte/cosmos_2D_game/main/images/meteor2.png'
            ];
            const meteor = document.createElement('div');
            meteor.classList.add('meteor');

            const sizeModifier = Math.random() < 0.5 ? 0.5 : 0.7;
            meteor.style.width = `${100 * sizeModifier}px`;
            meteor.style.height = `${100 * sizeModifier}px`;
            meteor.style.backgroundImage = `url(${meteorTypes[Math.floor(Math.random() * meteorTypes.length)]})`;

            const meteorLeft = Math.random() * window.innerWidth;
            const meteorWidth = 100 * sizeModifier;
            meteor.style.left = `${meteorLeft}px`;
            gameContainer.appendChild(meteor);

            let meteorY = 0;
            let lastTime = null;
            let rafId;
            let cancelled = false;
            const fallSpeed = Math.random() < 0.5 ? 10 : 5;

            function fall(timestamp) {
                if (cancelled) return;
                if (!lastTime) lastTime = timestamp;
                const delta = Math.min(timestamp - lastTime, 50);
                lastTime = timestamp;

                meteorY += fallSpeed * (delta / 30);
                meteor.style.transform = `translateY(${meteorY}px)`;

                if (meteorY > window.innerHeight) {
                    meteor.remove();
                    activeRafs.delete(cancel);
                    return;
                }

                if (!gameOver) {
                    const p = getPlaneBox();
                    if (meteorY < p.bottom &&
                        meteorY + meteorWidth > p.top &&
                        meteorLeft < p.right &&
                        meteorLeft + meteorWidth > p.left) {
                        meteor.remove();
                        activeRafs.delete(cancel);
                        triggerExplosion(p);
                        return;
                    }
                }

                rafId = requestAnimationFrame(fall);
            }

            rafId = requestAnimationFrame(fall);
            const cancel = () => { cancelled = true; cancelAnimationFrame(rafId); meteor.remove(); };
            activeRafs.add(cancel);
        }

        function triggerExplosion(p) {
            gameOver = true;
            explosion.style.left = `${p.left + PLANE_W / 2 - 100}px`;
            explosion.style.top = `${p.top + PLANE_H / 2 - 100}px`;
            explosion.style.display = 'block';
            explosion.style.animation = 'blink 1s infinite';
            plane.style.display = 'none';
            setTimeout(() => {
                explosion.style.display = 'none';
                setTimeout(showEndScreen, 2000); 
            }, 1000); // time explosion duration
        }

        function showEndScreen() {
            endScreen.style.display = 'flex';
        }

        function startGame() {
            // reset all 
            resetGame();

            startScreen.style.display = 'none';
            endScreen.style.display = 'none';
            gameContainer.style.display = 'block'; // show game container    
            plane.style.display = 'block'; // show plane
            scoreElement.style.display = 'block'; // show score
            timerElement.style.display = 'block'; // show timer
            plane.classList.add('plane-start');

            setTimeout(() => {
                plane.classList.remove('plane-start');
                startTimer();
                gameIntervals.push(setInterval(createStar, 1000)); 
                gameIntervals.push(setInterval(createMeteor, 2000)); 
            }, 5000); 
        }

        function startTimer() {
            let timeLeft = 20; 
            const timerInterval = setInterval(() => {
                if (gameOver) {
                    clearInterval(timerInterval);
                    return;
                }
                timeLeft--;
                timerElement.textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    endGameSuccess();
                }
            }, 1000);
            gameIntervals.push(timerInterval); 
        }

        function endGame() {
            setTimeout(() => {
                plane.style.display = 'none';
                endScreen.style.display = 'flex';
            }, 3000); 
        }

        function endGameSuccess() {
            gameOver = true;
            plane.classList.add('plane-end');
            setTimeout(() => {
                plane.style.display = 'none';
                congratsScreen.style.display = 'flex';
                earnedScore.textContent = `YOU EARNED: ${score}`;
                setTimeout(() => {
                    congratsScreen.style.display = 'none';
                    startScreen.style.display = 'flex';
                }, 3000); 
            }, 3000); 
        }

        function retryGame() {
            resetGame();
            startGame(); 
        }

        function quitGame() {
            window.close();
        }

        function resetGame() {
            gameIntervals.forEach(clearInterval);
            gameIntervals = [];

            activeRafs.forEach(cancel => cancel());
            activeRafs.clear();

            document.querySelectorAll('.star').forEach(star => star.remove());
            document.querySelectorAll('.meteor').forEach(meteor => meteor.remove());

            gameOver = false;
            score = 0;
            planeLeft = window.innerWidth / 2 - PLANE_W / 2;
            scoreElement.textContent = `Score: ${score}`;
            plane.classList.remove('plane-end');
            plane.classList.remove('plane-start');
        }
    </script>
</body>
</html>
